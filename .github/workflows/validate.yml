name: Validate DANDORI definitions

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Validate definitions
        run: python scripts/validate_definitions.py

      - name: Run validator mutation tests
        run: python -m unittest discover -s tests -p "test_*.py"
