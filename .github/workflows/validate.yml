name: Validate DANDORI definitions

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Validate definitions
        run: python scripts/validate_definitions.py

      - name: Run validator mutation tests
        run: python -m unittest discover -s tests -p "test_*.py"
